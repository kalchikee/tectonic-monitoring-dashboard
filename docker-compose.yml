version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.4
    container_name: tectonic_db
    environment:
      POSTGRES_DB: tectonic_monitor
      POSTGRES_USER: tectonic
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tectonic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_initial_schema.sql:/docker-entrypoint-initdb.d/001_initial_schema.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tectonic -d tectonic_monitor"]
      interval: 10s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: tectonic_pipeline
    command: python pipeline/scheduler.py
    environment:
      DATABASE_URL: postgresql://tectonic:${POSTGRES_PASSWORD:-tectonic}@db:5432/tectonic_monitor
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  api:
    build: .
    container_name: tectonic_api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://tectonic:${POSTGRES_PASSWORD:-tectonic}@db:5432/tectonic_monitor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  dashboard:
    build: .
    container_name: tectonic_dashboard
    command: streamlit run app/main.py --server.port 8501 --server.address 0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
      DATABASE_URL: postgresql://tectonic:${POSTGRES_PASSWORD:-tectonic}@db:5432/tectonic_monitor
    ports:
      - "8501:8501"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
